name: iremember_app
description: "iRememberApp by ChrizDev - App de recordatorios offline para Viviana."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- DEPENDENCIAS PARA EL PROYECTO ---
  
  # Notificaciones locales (funciona sin internet)
  flutter_local_notifications: ^17.2.2
  
  # Manejo de zonas horarias para los recordatorios
  timezone: ^0.9.4
  
  # Base de datos local (SQLite) para persistencia offline
  sqflite: ^2.3.3+1
  
  # Para encontrar las rutas de almacenamiento en el celular
  path_provider: ^2.1.3
  
  # Para formatear las fechas y días de la semana en español
  intl: ^0.19.0
  
  # Gestión de estado
  provider: ^6.1.2
  
  # Cámara para fotos de referencia
  image_picker: ^1.1.2

  # Persistencia de configuración
  shared_preferences: ^2.3.2

  # Compartir archivos (para exportar)
  share_plus: ^10.1.3

  # Gestión de permisos
  permission_handler: ^11.3.1

  # Peticiones HTTP
  http: ^1.2.2

  # Calendario interactivo
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Generador de íconos de la app
  flutter_launcher_icons: ^0.13.1

# Configuración del ícono de la app
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icon_app.png"
  adaptive_icon_background: "#673AB7"
  adaptive_icon_foreground: "assets/images/icon_app.png"

flutter:
  uses-material-design: true

  # Activamos los assets para que reconozca tu ícono y fotos
  assets:
    - assets/images/
